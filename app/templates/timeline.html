{% extends "base.html" %}

{% block content %}
<div class="page-hero">
    <h1 data-reveal><span class="gradient-text">Timeline</span></h1>
    <p data-reveal>Leave a message &mdash; it's saved to the database in real time</p>
</div>

<section class="section" id="timeline">
    <div class="section-inner">
        <!-- The form: on submit, JS sends these fields to POST /api/timeline_post -->
        <form id="timeline-form" class="glass timeline-form" data-reveal>
            <div class="form-row">
                <input type="text" name="name" placeholder="Your name" required>
                <input type="email" name="email" placeholder="Your email" required>
            </div>
            <textarea name="content" rows="3" placeholder="Write something..." required></textarea>
            <div class="form-actions">
                <span class="form-status" id="form-status"></span>
                <button type="submit" class="btn btn-primary">Post</button>
            </div>
        </form>

        <!-- Posts get rendered here by JS after fetching GET /api/timeline_post -->
        <div id="timeline-posts" class="timeline-posts" aria-live="polite"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/timeline.js"></script>
{% endblock %}
