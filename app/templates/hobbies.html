{% extends "base.html" %}

{% block content %}
<div class="page-hero">
    <h1>My Hobbies</h1>
    <p>Things I love doing outside of work</p>
</div>

<section class="section" id="hobbies">
    <div class="section-inner">
        <div class="hobbies-grid">
            {% for hobby in hobbies %}
            <div class="hobby-card">
                <div class="hobby-img-wrap">
                    <img src="/static/img/{{ hobby.image }}" alt="{{ hobby.name }}"
                        onerror="this.src='/static/img/logo.jpg'">
                </div>
                <div class="hobby-info">
                    <h3>{{ hobby.name }}</h3>
                    <p>{{ hobby.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
