<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="icon" href="/static/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles/main.css">
    <!-- Leaflet (travel map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <!-- Animated aurora background -->
    <div class="aurora" aria-hidden="true">
        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="blob blob-3"></span>
    </div>

    <header class="nav-bar">
        <div class="nav-content">
            <a href="/" class="nav-logo"><img src="/static/img/logo.svg" alt="Logo"></a>
            <nav>
                {% for page in pages %}
                <a href="{{ page.url }}" class="nav-link" data-section="{{ page.url.split('#')[1] if '#' in page.url else '' }}">{{ page.name }}</a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-socials">
            {% for social in socials %}
            <a href="{{ social.url }}" target="_blank" rel="noopener">{{ social.name }}</a>
            {% endfor %}
        </div>
        <p>&copy; {{ profile.name }} &middot; Built with Flask for the MLH Fellowship</p>
    </footer>

    <script>
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        /* Scroll-spy: highlight the nav button for the section in view */
        const navLinks = document.querySelectorAll('.nav-link[data-section]');
        const sections = [...navLinks]
            .map(link => document.getElementById(link.dataset.section))
            .filter(Boolean);

        if (sections.length) {
            const spy = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.id;
                        navLinks.forEach(link =>
                            link.classList.toggle('active', link.dataset.section === id));
                    }
                });
            }, { rootMargin: '-45% 0px -50% 0px' });
            sections.forEach(section => spy.observe(section));
        }

        /* Scroll-reveal: fade elements in as they enter the viewport */
        const revealEls = document.querySelectorAll('[data-reveal]');
        if (reduceMotion) {
            revealEls.forEach(el => el.classList.add('in-view'));
        } else if (revealEls.length) {
            const revealer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                        obs.unobserve(entry.target);
                    }
                });
            }, { rootMargin: '0px 0px -8% 0px', threshold: .12 });
            revealEls.forEach(el => revealer.observe(el));
        }

        /* Count-up: animate any [data-count] number when it scrolls into view */
        const counters = document.querySelectorAll('[data-count]');
        if (counters.length) {
            const runCount = (el) => {
                const target = parseFloat(el.dataset.count);
                const suffix = el.dataset.suffix || '';
                if (reduceMotion) { el.textContent = target + suffix; return; }
                const start = performance.now();
                const dur = 1400;
                const tick = (now) => {
                    const p = Math.min((now - start) / dur, 1);
                    const eased = 1 - Math.pow(1 - p, 3);
                    el.textContent = Math.round(target * eased) + suffix;
                    if (p < 1) requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
            };
            const countObs = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) { runCount(entry.target); obs.unobserve(entry.target); }
                });
            }, { threshold: .6 });
            counters.forEach(c => countObs.observe(c));
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
